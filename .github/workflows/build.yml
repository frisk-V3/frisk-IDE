name: Build All Platforms

on:
  push:
    branches:
      - s
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            # PowerShellでドットを含む引数が分割されないよう、個別に指定
            args: '-w --config.win.sign=false --config.win.target=nsis'
          - os: macos-latest
            args: '-m --config.mac.identity=null --config.mac.type=development'
          - os: ubuntu-latest
            args: '-l'

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools libfuse2

      - name: Install dependencies
        # 毎回フルでインストール
        run: npm install

      - name: Build application
        # 引用符で囲んで引数を渡すことで、Windowsでの誤認を徹底防止
        run: |
          npm run build --if-present
          npx electron-builder --publish never ${{ matrix.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_SKIP_2FA_SETTING: true
          ELECTRON_SKIP_NOTARIZATION: true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: Build ${{ github.ref_name }}
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.zip
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
