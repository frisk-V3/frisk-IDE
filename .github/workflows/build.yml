name: Build All Platforms

on:
  push:
    branches:
      - s
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            platform: --windows
          - os: macos-latest
            platform: --mac
          - os: ubuntu-latest
            platform: --linux

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools libfuse2

      - name: Install dependencies
        run: npm install

      - name: Build application
        # npm run dist は --win が固定されているので使いません
        # 直接 npx で叩き、OSごとのフラグと署名無効設定を注入します
        run: |
          npx electron-builder ${{ matrix.platform }} --publish never -c.win.sign=false -c.mac.identity=null -c.mac.type=development
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_SKIP_2FA_SETTING: true
          ELECTRON_SKIP_NOTARIZATION: true

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push'
        with:
          tag_name: ${{ github.ref_name }}
          name: Build ${{ github.ref_name }}
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.zip
            dist/*.deb
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
