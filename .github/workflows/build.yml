name: Build All Platforms

on:
  push:
    branches:
      - s  # 指定通り 's' ブランチへのプッシュで実行
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            args: '--windows -c.win.sign=false -c.win.target=nsis'
          - os: macos-latest
            args: '--mac -c.mac.identity=null -c.mac.type=development'
          - os: ubuntu-latest
            args: '--linux'

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # キャッシュ有効化でビルド時間を短縮

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools libfuse2

      - name: Install dependencies
        run: npm ci # package-lock.json を元に厳密にインストール

      - name: Build application
        # コンパイル(tsc)が必要なプロジェクトなのでビルド後に実行
        run: |
          npm run build --if-present
          npx electron-builder --publish never ${{ matrix.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_SKIP_2FA_SETTING: true
          ELECTRON_SKIP_NOTARIZATION: true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        # タグプッシュ時のみリリースを作成・アップロード
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: Build ${{ github.ref_name }}
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.zip
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
