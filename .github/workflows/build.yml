name: Build All Platforms

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # タグが打たれた時にも動くようにしておくとリリースが楽です

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    # リリースを作成するために書き込み権限が必要です
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm' # キャッシュを有効にするとビルドが早くなります

      - name: Install dependencies
        run: npm install

      - name: Disable Windows Code Signing
        # if文の中では ${{ }} は不要です
        if: matrix.os == 'windows-latest'
        run: |
          echo "win:" >> electron-builder.yml
          echo "  sign: false" >> electron-builder.yml
          echo "  target: nsis" >> electron-builder.yml

      - name: Build application
        run: npm run dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 署名エラーで落ちるのを防ぐおまじない
          CSC_SKIP_2FA_SETTING: true 

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        # mainへのpush、またはタグが打たれた時のみアップロード
        if: github.event_name == 'push'
        with:
          tag_name: ${{ github.ref_name }}
          name: Build ${{ github.ref_name }}
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.zip
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
