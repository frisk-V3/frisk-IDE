name: Build All Platforms

on:
  push:
    branches:
      - s
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            args: --windows -c.win.sign=false
          - os: macos-latest
            args: --mac -c.mac.identity=null -c.mac.type=distribution
          - os: ubuntu-latest
            args: --linux

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # Linuxの場合だけ、ビルドに必要なパッケージをインストールします
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools libfuse2

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run dist -- ${{ matrix.args }} -c.publish=never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_SKIP_2FA_SETTING: true 

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push'
        with:
          tag_name: ${{ github.ref_name }}
          name: Build ${{ github.ref_name }}
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.zip
            dist/*.deb
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
