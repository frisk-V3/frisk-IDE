<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>V3 Editor</title>
    <link rel="stylesheet" href="Editor.css">
</head>
<body>

    <div id="editor-container">
        <pre id="highlight"></pre>

</html>
